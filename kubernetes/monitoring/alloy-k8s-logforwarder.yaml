###############################################################################
# Nexus AgenticAI — Lightweight in-cluster log forwarder
#
# This is the ONLY monitoring resource deployed inside Kubernetes.
# Prometheus, Grafana, and Loki all run externally in docker-compose.
#
# What this does:
#   Runs a Grafana Alloy DaemonSet on every K8s node.
#   Each pod reads /var/log/pods/ from the node, enriches log lines with
#   pod/namespace/service labels, and pushes them to your external Loki.
#
# Before applying:
#   Replace <MONITORING_VM_IP> below with the IP of the machine running
#   your prod-prometheus docker-compose stack.
#   Then:  kubectl apply -f kubernetes/monitoring/alloy-k8s-logforwarder.yaml
###############################################################################

---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    name: monitoring

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy-log-forwarder
  namespace: monitoring

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy-log-forwarder
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "namespaces"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy-log-forwarder
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy-log-forwarder
subjects:
  - kind: ServiceAccount
    name: alloy-log-forwarder
    namespace: monitoring

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-k8s-config
  namespace: monitoring
data:
  config.alloy: |
    logging {
      level  = "info"
      format = "logfmt"
    }

    // Discover pods running on THIS node via the in-cluster K8s API
    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "pod_logs" {
      targets = discovery.kubernetes.pods.targets

      // Drop pods that are not in Running phase
      rule {
        source_labels = ["__meta_kubernetes_pod_phase"]
        regex         = "Pending|Succeeded|Failed|Unknown"
        action        = "drop"
      }

      // Build path:  /var/log/pods/<ns>_<pod>_<uid>/<container>/*.log
      rule {
        source_labels = [
          "__meta_kubernetes_pod_namespace",
          "__meta_kubernetes_pod_name",
          "__meta_kubernetes_pod_uid",
          "__meta_kubernetes_pod_container_name",
        ]
        separator    = "/"
        target_label = "__path__"
        replacement  = "/var/log/pods/$1_$2_$3/$4/*.log"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_namespace"]
        target_label  = "namespace"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }

      // 'app' pod label → 'service' Loki label  (matches Nexus deployments)
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "service"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        target_label  = "node"
      }
    }

    loki.source.file "pod_logs" {
      targets    = discovery.relabel.pod_logs.output
      forward_to = [loki.process.enrich.receiver]
    }

    loki.process "enrich" {
      // Try to parse JSON-structured log lines
      stage.json {
        expressions = {
          level   = "level",
          message = "message",
          msg     = "msg",
        }
      }

      stage.labels {
        values = {
          level = "",
        }
      }

      stage.drop {
        expression          = "^\\s*$"
        drop_counter_reason = "empty_line"
      }

      stage.static_labels {
        values = {
          env     = "production",
          cluster = "nexus-k8s",
        }
      }

      forward_to = [loki.write.external_loki.receiver]
    }

    // Push to the external Loki running in docker-compose on your monitoring VM
    loki.write "external_loki" {
      endpoint {
        // Replace <MONITORING_VM_IP> with the actual IP of your monitoring server
        url = "http://<MONITORING_VM_IP>:3100/loki/api/v1/push"
      }
    }

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy-log-forwarder
  namespace: monitoring
  labels:
    app: alloy-log-forwarder
spec:
  selector:
    matchLabels:
      app: alloy-log-forwarder
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: alloy-log-forwarder
    spec:
      serviceAccountName: alloy-log-forwarder
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: alloy
          image: grafana/alloy:v1.1.1
          args:
            - run
            - /etc/alloy/config.alloy
            - --storage.path=/var/lib/alloy/data
            - --server.http.listen-addr=0.0.0.0:12345
          ports:
            - name: http
              containerPort: 12345
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: storage
              mountPath: /var/lib/alloy/data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
      volumes:
        - name: config
          configMap:
            name: alloy-k8s-config
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: storage
          emptyDir: {}
