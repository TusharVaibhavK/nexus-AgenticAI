global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: nexus-k8s

rule_files:
  - "/etc/prometheus/rules/*.yml"

# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#             - alertmanager:9093

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: cadvisor-local
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          env: local

  # Remote cAdvisor instances running on other VMs
  # Replace the IPs below with your actual VM IPs
  - job_name: cadvisor-remote
    static_configs:
      - targets: ["<VM1_IP>:8080"]
        labels:
          env: production
          vm: vm1

  # ── Nexus K8s microservices ────────────────────────────────────────────────
  # Prometheus scrapes /metrics on each service via its NodePort.
  #
  # How to find the values to fill in:
  #   K8S_NODE_IP  →  kubectl get nodes -o wide   (use INTERNAL-IP or EXTERNAL-IP)
  #   NODEPORT     →  kubectl get svc -n default   (look at the PORT(S) column,
  #                   e.g. "80:31234/TCP" means NodePort is 31234)
  #
  # The /metrics path is served by prometheus-fastapi-instrumentator on the
  # container port, which is forwarded through the NodePort service unchanged.
  # ──────────────────────────────────────────────────────────────────────────

  - job_name: intent-agent
    metrics_path: /metrics
    static_configs:
      - targets: ["<K8S_NODE_IP>:<INTENT_AGENT_NODEPORT>"]
        labels:
          service: intent-agent
          namespace: default
          env: production

  - job_name: sql-query-generator
    metrics_path: /metrics
    static_configs:
      - targets: ["<K8S_NODE_IP>:<SQL_QUERY_GEN_NODEPORT>"]
        labels:
          service: sql-query-generator
          namespace: default
          env: production

  # Uncomment once the sql-validator service is deployed
  # - job_name: sql-validator
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ["<K8S_NODE_IP>:<SQL_VALIDATOR_NODEPORT>"]
